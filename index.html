// -- Supabase client ----------------------------------
async function sbFetch(path,method,body){
  const r=await fetch(SUPABASE_URL+path,{
    method:method||"GET",
    headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY},
    body:body?JSON.stringify(body):undefined
  });
  return r.json();
}
async function sbGet(table,filter){
  let url="/rest/v1/"+table+"?select=*";
  if(filter)url+="&"+filter;
  return sbFetch(url);
}
async function sbInsert(table,row){
  return sbFetch("/rest/v1/"+table,"POST",row);
}
async function sbUpdate(table,filter,row){
  return sbFetch("/rest/v1/"+table+"?"+filter,"PATCH",row);
}
async function sbUpsert(table,row,onConflict){
  let url="/rest/v1/"+table+"?on_conflict="+onConflict;
  const r=await fetch(SUPABASE_URL+url,{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,"Prefer":"resolution=merge-duplicates"},
    body:JSON.stringify(row)
  });
  return r.json();
}

// -- Email via Supabase Edge Function -----------------
// (falls back to mailto if not configured)
function sendEmail(to,subject,body){
  const s=encodeURIComponent(subject);
  const b=encodeURIComponent(body);
  window.open("mailto:"+to+"?subject="+s+"&body="+b);
}

// -- Helpers ------------------------------------------
function $(id){return document.getElementById(id);}
function el(tag,props,children){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else{e[k]=v;}
  });
  if(children){(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });}
  return e;
}
function div(style,children){return el("div",{style},children);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return"";const[y,m,dd]=d.split("-");return dd+"/"+m+"/"+y;}
function fmtDT(dt){
  if(!dt)return"";const d=new Date(dt);
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")
    +" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function isOv(d){return d&&d<todayStr();}

// -- Data ---------------------------------------------
let D=null;
async function loadD(){
  try{
    const rows=await sbGet("eng_data","order=updated_at.desc&limit=1");
    if(rows&&rows[0]&&rows[0].payload&&rows[0].payload.obras){
      D=rows[0].payload;D._dbId=rows[0].id;
    }
  }catch(e){console.warn("loadD error",e);}
  if(!D)D=makeSeed();
  D.obras.forEach(o=>o.tasks.forEach(t=>{if(!t.chat)t.chat=[];}));
}
async function saveD(){
  try{
    const payload={...D};delete payload._dbId;
    if(D._dbId){
      await sbUpdate("eng_data","id=eq."+D._dbId,{payload,updated_at:new Date().toISOString()});
    } else {
      const r=await sbInsert("eng_data",{payload});
      if(r&&r[0])D._dbId=r[0].id;
    }
  }catch(e){console.warn("saveD error",e);localStorage.setItem("eng_bkp",JSON.stringify(D));}
}

function makeSeed(){
  let nid=1;const id=()=>nid++;const td=todayStr();
  const mkO=(nome,local,rs,ts)=>{
    const resps=rs.map(r=>({id:id(),nome:r.n,email:r.e||""}));
    const tasks=ts.map(t=>{const r=resps.find(x=>x.nome===t.r);

// -- Users via Supabase --------------------------------
async function getUsers(){
  try{const r=await sbGet("eng_users");return r||[];}catch{return[];}
}
async function createUser(email,pass,name){
  return sbInsert("eng_users",{email,password:pass,name,status:"pending"});
}
async function approveUser(email){
  return sbUpdate("eng_users","email=eq."+encodeURIComponent(email),{status:"approved"});
}
async function blockUser(email){
  return sbUpdate("eng_users","email=eq."+encodeURIComponent(email),{status:"blocked"});
}
async function findUser(email,pass){
  try{
    const r=await sbGet("eng_users","email=eq."+encodeURIComponent(email)+"&password=eq."+encodeURIComponent(pass));
    return r&&r[0]?r[0]:null;
  }catch{return null;}
}

// -- Alarm checker ------------------------------------
function checkAlarms(){
  if(!D)return;
  const now=new Date();
  D.obras.forEach(obra=>{
    obra.tasks.forEach(task=>{
      if(task.done||!task.data)return;
      const resp=obra.resps.find(r=>r.id===task.rId);
      if(!resp||!resp.email)return;
      const due=new Date(task.data+"T08:00:00");
      const key="alrm_"+task.id+"_"+task.data;
      if(due<=now&&!localStorage.getItem(key)){
        localStorage.setItem(key,"1");
        sendEmail(resp.email,
          "[Engedomus] Tarefa vencida: "+task.desc.slice(0,50),
          "Ola "+resp.nome+",\n\nA seguinte tarefa venceu hoje:\n\nObra: "+obra.nome+"\nTarefa: "+task.desc+"\nVencimento: "+fmtDate(task.data)+"\n\nPor favor atualize o status no sistema.\n\nEngedomus Construtora"
        );
      }
    });
  });
}
setInterval(checkAlarms,60000);

function renderAuth(){
  let mode="login";

  const logoBox=div({textAlign:"center",marginBottom:"24px",paddingBottom:"20px",borderBottom:"1px solid #EAEDF7"});
  const logoImg=el("img",{src:"data:image/png;base64,"+LOGO,alt:"Engedomus",

    textAlign:"center",marginBottom:"4px"},"Controle de Obras");
  const subtitleEl=div({fontSize:"12px",color:"#6B78A0",textAlign:"center",marginBottom:"22px"},

  const errBox=div({background:"#FEF0EE",border:"1px solid #C0392B",borderRadius:"8px",
    padding:"9px 13px",fontSize:"12px",color:"#C0392B",marginBottom:"12px",display:"none"});
  const okBox=div({background:"#EDFAF3",border:"1px solid #1A7A45",borderRadius:"8px",
    padding:"9px 13px",fontSize:"12px",color:"#1A7A45",marginBottom:"12px",display:"none"});
  function inp(ph,type){
    return el("input",{type:type||"text",placeholder:ph,
      style:{width:"100%",border:"1.5px solid #DDE2F0",borderRadius:"8px",
        padding:"11px 13px",fontSize:"13px",outline:"none",background:"#F2F4F9",
        fontFamily:"inherit",boxSizing:"border-box",marginBottom:"12px"}});
  }
  function lbl(t){return el("label",{style:{display:"block",fontSize:"10px",color:"#6B78A0",
    letterSpacing:"1px",textTransform:"uppercase",marginBottom:"4px"}},t);}
  const nameGroup=div({display:"none"});
  nameGroup.appendChild(lbl("Seu Nome"));
  const nameI=inp("Nome completo");nameGroup.appendChild(nameI);
  const emailGroup=div({});emailGroup.appendChild(lbl("Email"));
  const emailI=inp("seu@email.com","email");emailGroup.appendChild(emailI);
  const passGroup=div({});passGroup.appendChild(lbl("Senha"));
  const passI=inp("••••••••","password");passGroup.appendChild(passI);
  const submitBtn=el("button",{style:{width:"100%",
    background:"linear-gradient(135deg,"+BLUE+","+B_MID+")",color:"#fff",border:"none",
    borderRadius:"8px",padding:"13px",fontSize:"14px",fontWeight:700,cursor:"pointer",
    marginTop:"4px",fontFamily:"inherit"}},"Entrar");
  const toggleDiv=div({textAlign:"center",marginTop:"14px",fontSize:"12px",color:"#6B78A0"});
  const toggleTxt=document.createTextNode("Nao tem conta? ");
  const toggleA=el("span",{style:{color:"#D4760C",cursor:"pointer",textDecoration:"underline"}},"Criar conta");
  toggleDiv.appendChild(toggleTxt);toggleDiv.appendChild(toggleA);
  function setErr(m){errBox.textContent=m;errBox.style.display=m?"block":"none";okBox.style.display="none";}
  function setOk(m){okBox.textContent=m;okBox.style.display=m?"block":"none";errBox.style.display="none";}
  function setMode(m){
    mode=m;
    nameGroup.style.display=m==="signup"?"block":"none";
    submitBtn.textContent=m==="login"?"Entrar":"Solicitar Acesso";
    subtitleEl.textContent=m==="login"?"Acesse sua conta para continuar":"Solicite seu acesso";
    toggleTxt.textContent=m==="login"?"Nao tem conta? ":"Ja tem conta? ";
    toggleA.textContent=m==="login"?"Criar conta":"Entrar";
    setErr("");setOk("");
  }
  toggleA.addEventListener("click",()=>setMode(mode==="login"?"signup":"login"));
  async function doAuth(){
    const email=emailI.value.trim(),pass=passI.value,name=nameI.value.trim();
    if(!email||!pass){setErr("Preencha email e senha");return;}
    submitBtn.disabled=true;submitBtn.textContent="Aguarde...";
    if(mode==="signup"){
      if(!name){setErr("Informe seu nome");submitBtn.disabled=false;submitBtn.textContent="Solicitar Acesso";return;}
      try{
        const existing=await findUser(email,pass);
        if(existing){setErr("Email ja cadastrado");submitBtn.disabled=false;submitBtn.textContent="Solicitar Acesso";return;}
        await createUser(email,pass,name);
        sendEmail(ADMIN_EMAIL,
          "[Engedomus] Novo usuario aguardando aprovacao: "+name,
          "Novo usuario solicitou acesso:\n\nNome: "+name+"\nEmail: "+email+"\n\nAcesse o sistema para aprovar ou bloquear.\n\nEngedomus Construtora"
        );
        setOk("Solicitacao enviada! Aguarde a aprovacao do administrador.");
      }catch(e){setErr("Erro ao cadastrar. Tente novamente.");}
      submitBtn.disabled=false;submitBtn.textContent="Solicitar Acesso";
    } else {
      try{
        const u=await findUser(email,pass);
        if(!u){setErr("Email ou senha invalidos");submitBtn.disabled=false;submitBtn.textContent="Entrar";return;}
        if(u.status==="pending"){setErr("Acesso ainda nao aprovado. Aguarde o email de confirmacao.");submitBtn.disabled=false;submitBtn.textContent="Entrar";return;}
        if(u.status==="blocked"){setErr("Acesso bloqueado. Entre em contato com o administrador.");submitBtn.disabled=false;submitBtn.textContent="Entrar";return;}
        ME=u.name;ME_EMAIL=email;
        localStorage.setItem("eng8_s",JSON.stringify({email,name:ME}));
        showLoading("Carregando obras...");
        await loadD();
        render();
      }catch(e){setErr("Erro ao conectar. Tente novamente.");submitBtn.disabled=false;submitBtn.textContent="Entrar";}
    }
  }
  submitBtn.addEventListener("click",doAuth);
  [emailI,passI,nameI].forEach(i=>i.addEventListener("keydown",e=>{if(e.key==="Enter")doAuth();}));
  [titleEl,subtitleEl,errBox,okBox,nameGroup,emailGroup,passGroup,submitBtn,toggleDiv].forEach(c=>card.appendChild(c));
  wrap.appendChild(card);
  return wrap;
}

function renderRespBlock(obra,resp){
  const tasks=obra.tasks.filter(t=>t.rId===resp.id);
  const act=tasks.filter(t=>!t.done).length;
  const hasU=tasks.some(t=>t.status==="urgente"&&!t.done);
  const dc=hasU?"#C0392B":act===0?"#1A7A45":ORANGE;
  const block=div({background:"#fff",border:"1.5px solid #EAEDF7",borderRadius:"9px",
    marginBottom:"11px",overflow:"hidden",boxShadow:"0 1px 3px rgba(38,55,111,0.05)"});
  const rh=div({display:"flex",alignItems:"center",justifyContent:"space-between",
    padding:"10px 15px",borderBottom:"1px solid #EAEDF7",background:"#fff"});
  const rname=div({fontWeight:700,fontSize:"13px",display:"flex",alignItems:"center",gap:"8px",color:BLUE});
  rname.appendChild(div({width:"8px",height:"8px",borderRadius:"50%",background:dc}));
  rname.appendChild(document.createTextNode(resp.nome));
  if(resp.email)rname.appendChild(div({fontSize:"10px",color:"#1A7A45",background:"#EDFAF3",
    padding:"1px 6px",borderRadius:"4px",marginLeft:"4px"},"📧"));
  rname.appendChild(div({fontSize:"11px",color:"#6B78A0",fontWeight:400},
    " "+act+" pendente"+(act!==1?"s":"")));
  const rbtns=div({display:"flex",gap:"5px"});
  rbtns.appendChild(mkIconBtn("+",()=>{qaRId=resp.id;render();}));
  rbtns.appendChild(mkIconBtn("✉",()=>showModal("resp_edit",resp)));
  rh.appendChild(rname);rh.appendChild(rbtns);
  const content=div({});
  rh.addEventListener("click",e=>{if(rbtns.contains(e.target))return;
    content.style.display=content.style.display==="none"?"":"none";});
  block.appendChild(rh);
  if(!tasks.length)content.appendChild(div({padding:"11px 15px",fontSize:"11px",color:"#A8B2CC"},"Nenhuma tarefa"));
  tasks.forEach(t=>content.appendChild(renderTaskRow(t,resp,obra.id)));
  if(qaRId===resp.id){
    const qa=div({display:"flex",alignItems:"center",gap:"10px",padding:"9px 15px",
      background:"#FEF4E8",borderTop:"1px solid #EAEDF7"});
    qa.appendChild(div({width:"20px",height:"20px",borderRadius:"50%",border:"2px solid #DDE2F0",flexShrink:0}));
    const qi=el("input",{placeholder:"Nova tarefa...",
      style:{flex:1,border:"none",background:"transparent",fontSize:"13px",
        color:"#1A2244",outline:"none",fontFamily:"inherit"}});
    qi.addEventListener("keydown",e=>{
      if(e.key==="Enter"&&qi.value.trim()){
        const ni=(D.nid||1)+1;D.nid=ni;
        obra.tasks.push({id:ni,rId:resp.id,desc:qi.value.trim(),status:"pendente",
          pri:0,data:"",obs:"",done:false,chat:[]});
        saveD();qaRId=null;render();
      }
      if(e.key==="Escape"){qaRId=null;render();}
    });
    setTimeout(()=>qi.focus(),50);
    qa.appendChild(qi);content.appendChild(qa);
  }
  const addbtn=div({display:"flex",alignItems:"center",gap:"6px",padding:"8px 15px",
    fontSize:"11px",color:"#6B78A0",cursor:"pointer",borderTop:"1px dashed #DDE2F0"},
    "+ adicionar tarefa");

function renderTaskRow(t,resp,obraId){
  const isExp=expTask===t.id;
  const ov=isOv(t.data)&&!t.done;
  const cc=(t.chat||[]).length;
  const PL=["","!","!!","!!!"],PC=["","#D4760C","#E07A1A","#C0392B"];
  const row=div({display:"flex",alignItems:"flex-start",gap:"10px",padding:"9px 15px",
    borderBottom:"1px solid #EAEDF7",background:isExp?"#EEF1FA":"#fff",flexWrap:"wrap"});
  row.appendChild(renderCircle(t,()=>toggleDone(t.id,obraId)));
  const body=div({flex:1,minWidth:0,cursor:"pointer"});
  const trow=div({display:"flex",alignItems:"baseline",gap:"5px"});
  const txt=div({fontSize:"13px",lineHeight:1.4,color:"#1A2244"},t.desc);
  if(t.done){txt.style.opacity="0.38";txt.style.textDecoration="line-through";}
  trow.appendChild(txt);
  if(t.pri>0)trow.appendChild(div({fontSize:"11px",fontWeight:700,color:PC[t.pri],flexShrink:0},PL[t.pri]));
  body.appendChild(trow);
  const tags=div({display:"flex",gap:"5px",marginTop:"3px",flexWrap:"wrap"});
  if(t.data)tags.appendChild(mkTag((ov?"⚠ ":"")+fmtDate(t.data),ov?"#C0392B":"#6B78A0"));
  if(resp&&resp.email)tags.appendChild(mkTag("📧 "+resp.nome,"#1A7A45","#EDFAF3"));
  if(t.status==="urgente"&&!t.done)tags.appendChild(mkTag("⚡ Urgente","#C0392B","#FEF0EE"));
  if(t.status==="aguardando"&&!t.done)tags.appendChild(mkTag("⏳ Aguardando","#2E6BAD","#EEF4FF"));
  if(cc)tags.appendChild(mkTag("💬 "+cc,BLUE,"#EEF1FA"));
  if(t.obs)tags.appendChild(mkTag("📝","#6B78A0"));
  body.appendChild(tags);
  body.addEventListener("click",()=>toggleExp(t.id));
  const chev=mkChev(isExp);chev.addEventListener("click",()=>toggleExp(t.id));
  row.appendChild(body);row.appendChild(chev);
  if(isExp)row.appendChild(renderDetail(t,resp,obraId));
  return row;
}

function renderCircle(t,onClick){
  const bc=t.done?"#1A7A45":t.status==="urgente"?"#C0392B":t.status==="aguardando"?"#2E6BAD":"#DDE2F0";
  const wrap=div({flexShrink:0,cursor:"pointer",padding:"3px",margin:"-3px",borderRadius:"50%"});
  const c=div({width:"20px",height:"20px",borderRadius:"50%",border:"2px solid "+bc,
    background:t.done?"#1A7A45":"transparent",display:"flex",alignItems:"center",justifyContent:"center"});
  if(t.done){
    const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("width","11");svg.setAttribute("height","11");
    svg.setAttribute("viewBox","0 0 12 12");svg.setAttribute("fill","none");
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d","M2 6l3 3 5-5");p.setAttribute("stroke","white");
    p.setAttribute("stroke-width","2");p.setAttribute("stroke-linecap","round");

  wrap.addEventListener("click",e=>{e.stopPropagation();onClick();});

}

        "\n\n"+(t.data?"Prazo: "+fmtDate(t.data)+"\n\n":"")+"Aguardo retorno.\n\nEngedomus Construtora");
    }));
  }
  panel.appendChild(chips);
  const ow=div({padding:"9px 12px",borderBottom:"1px solid #EAEDF7"});
  const ota=el("textarea",{style:{width:"100%",background:"transparent",border:"none",
    fontSize:"12px",color:"#1A2244",resize:"none",outline:"none",minHeight:"40px",
    lineHeight:1.5,fontFamily:"inherit"}});
  ota.placeholder="Observacoes internas...";ota.value=t.obs||"";
  ota.addEventListener("blur",()=>{
    const o=D.obras.find(x=>x.id===obraId);const tk=o&&o.tasks.find(x=>x.id===t.id);
    if(tk&&tk.obs!==ota.value){tk.obs=ota.value;saveD();}

    color:"#6B78A0",letterSpacing:0.8,textTransform:"uppercase"},"💬 Chat da tarefa"));
  const msgs=div({maxHeight:"160px",overflowY:"auto",padding:"0 12px 4px",
    display:"flex",flexDirection:"column",gap:"5px"});
  if(!(t.chat&&t.chat.length))msgs.appendChild(div({fontSize:"11px",color:"#A8B2CC",
    textAlign:"center",padding:"8px"},"Sem mensagens ainda"));
  (t.chat||[]).forEach(m=>{
    const isMe=m.u===ME;
    const mw=div({display:"flex",flexDirection:isMe?"row-reverse":"row",gap:"6px"});
    const mb=div({display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start"});
    if(!isMe)mb.appendChild(div({fontSize:"9px",color:"#A8B2CC",marginBottom:"1px",paddingLeft:"3px"},m.u));
    mb.appendChild(div({padding:"6px 10px",
      borderRadius:isMe?"13px 13px 3px 13px":"13px 13px 13px 3px",
      fontSize:"12px",lineHeight:1.4,maxWidth:"75%",wordBreak:"break-word",

  const ci=el("input",{type:"text",placeholder:"Mensagem...",

      fontSize:"12px",outline:"none",fontFamily:"inherit",background:"#F2F4F9"}});
  function sendMsg(){
    if(!ci.value.trim())return;
    const o=D.obras.find(x=>x.id===obraId);const tk=o&&o.tasks.find(x=>x.id===t.id);
    if(!tk)return;if(!tk.chat)tk.chat=[];
    tk.chat.push({id:Date.now(),u:ME,t:ci.value.trim(),ts:new Date().toISOString()});
    saveD();render();
  }
  ci.addEventListener("keydown",e=>{if(e.key==="Enter")sendMsg();});
  const csend=el("button",{style:{background:BLUE,border:"none",borderRadius:"50%",
    width:"30px",height:"30px",display:"flex",alignItems:"center",
    justifyContent:"center",cursor:"pointer",flexShrink:0}});
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width","13");svg.setAttribute("height","13");
  svg.setAttribute("viewBox","0 0 24 24");svg.setAttribute("fill","#fff");
  const pth=document.createElementNS("http://www.w3.org/2000/svg","path");
  pth.setAttribute("d","M2 21l21-9L2 3v7l15 2-15 2z");

  const db=el("button",{style:{fontSize:"11px",color:"#C0392B",background:"none",
    border:"none",cursor:"pointer",fontFamily:"inherit"}},"🗑 Excluir");
  db.addEventListener("click",()=>{
    const o=D.obras.find(x=>x.id===obraId);
    if(o){o.tasks=o.tasks.filter(x=>x.id!==t.id);saveD();if(expTask===t.id)expTask=null;render();}
  });
  footer.appendChild(db);panel.appendChild(footer);
  return panel;
}

// -- Actions ------------------------------------------
async function toggleDone(tid,obraId){
  const o=D.obras.find(x=>x.id===obraId);const t=o&&o.tasks.find(x=>x.id===tid);
  if(!t)return;t.done=!t.done;
  if(t.done)t.status="concluido";else if(t.status==="concluido")t.status="pendente";
  if(expTask===tid)expTask=null;
  await saveD();render();
}
function toggleExp(id){expTask=expTask===id?null:id;render();}
async function delObra(id){
  D.obras=D.obras.filter(o=>o.id!==id);
  if(curObra===id){curObra=null;curSmart="hoje";}
  await saveD();render();
}

    w.appendChild(div({fontSize:"10px",color:"#6B78A0",letterSpacing:"1px",
      textTransform:"uppercase",marginBottom:"4px"},lbl));
    const i=el("input",{type:t2||"text",placeholder:ph,
      style:{width:"100%",border:"1.5px solid #DDE2F0",borderRadius:"7px",
        padding:"9px 12px",fontSize:"13px",outline:"none",background:"#F2F4F9",
        fontFamily:"inherit",boxSizing:"border-box"}});
    i.value=val||"";w.appendChild(i);mbody.appendChild(w);return i;
  }
  let f1,f2;
  if(type==="obra"||type==="obra_edit"){
    f1=finput("Nome da Obra","Ex: Arena Benedetti",type==="obra_edit"?data.nome:"");
    f2=finput("Local","Cidade, estado...",type==="obra_edit"?data.local||"":"");
  } else {
    f1=finput("Nome","Ex: Luxor, Carlos...",type==="resp_edit"?data.nome:"");
    f2=finput("Email (recebe alertas de vencimento)","email@fornecedor.com",
      type==="resp_edit"?(data.email||""):"","email");
  }
  box.appendChild(mbody);
  const mfoot=div({padding:"12px 20px",borderTop:"1px solid #EAEDF7",display:"flex",gap:"8px",
    justifyContent:"flex-end",background:"#F7F8FC",borderRadius:"0 0 12px 12px"});
  mfoot.appendChild(mkBtn("Cancelar",()=>overlay.remove()));
  const sb=mkBtn("Salvar",async()=>{
    if(!f1.value.trim())return;
    if(type==="obra"){
      const ni=(D.nid||1)+1;D.nid=ni;
      D.obras.push({id:ni,nome:f1.value.trim(),local:f2.value.trim(),resps:[],tasks:[]});
      curObra=ni;curSmart=null;
    } else if(type==="obra_edit"){
      const o=D.obras.find(x=>x.id===data.id);
      if(o){o.nome=f1.value.trim();o.local=f2.value.trim();}
    } else if(type==="resp"){
      if(!curObra)return;const o=D.obras.find(x=>x.id===curObra);if(!o)return;
      const ni=(D.nid||1)+1;D.nid=ni;
      o.resps.push({id:ni,nome:f1.value.trim(),email:f2.value.trim()});
    } else if(type==="resp_edit"){
      D.obras.forEach(o=>{const r=o.resps.find(x=>x.id===data.id);
        if(r){r.nome=f1.value.trim();r.email=f2.value.trim();}});
    }
    await saveD();overlay.remove();render();
  });
  sb.style.background="linear-gradient(135deg,"+ORANGE+",#D4760C)";
  sb.style.color="#fff";sb.style.border="none";sb.style.fontWeight=600;
  mfoot.appendChild(sb);box.appendChild(mfoot);
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  overlay.appendChild(box);document.body.appendChild(overlay);
  setTimeout(()=>f1.focus(),50);
}

// -- Helpers ------------------------------------------
function mkTag(text,color,bg){
  return div({fontSize:"10px",color:color,background:bg||"transparent",
    padding:"1px 5px",borderRadius:"4px",display:"inline-flex",alignItems:"center"},text);
}
function mkPill(text,color,bg){
  return div({fontSize:"10px",padding:"3px 10px",borderRadius:"20px",
    border:"1px solid "+color,color:color,background:bg},text);
}
function mkBtn(label,onClick){
  const b=el("button",{style:{fontSize:"11px",padding:"6px 12px",borderRadius:"6px",
    border:"1.5px solid #DDE2F0",background:"#fff",cursor:"pointer",fontFamily:"inherit"}},label);
  b.addEventListener("click",onClick);return b;
}
function mkIconBtn(label,onClick){
  const b=el("button",{style:{width:"26px",height:"26px",borderRadius:"5px",
    border:"1.5px solid #DDE2F0",background:"none",cursor:"pointer",
    fontSize:"12px",color:"#6B78A0",fontFamily:"inherit"}},label);
  b.addEventListener("click",e=>{e.stopPropagation();onClick();});return b;
}
function mkChev(open){
  const w=div({flexShrink:0,color:"#A8B2CC",cursor:"pointer",
    transform:open?"rotate(90deg)":"none",transition:"transform 0.2s"});
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width","10");svg.setAttribute("height","10");svg.setAttribute("viewBox","0 0 10 10");
  const p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d","M3 2l4 3-4 3");p.setAttribute("stroke","currentColor");
  p.setAttribute("stroke-width","1.5");p.setAttribute("stroke-linecap","round");
  p.setAttribute("stroke-linejoin","round");p.setAttribute("fill","none");
  svg.appendChild(p);w.appendChild(svg);return w;
}

// -- Boot ---------------------------------------------
(async()=>{
  const sess=localStorage.getItem("eng8_s");
  if(sess){
    try{
      const s=JSON.parse(sess);ME=s.name;ME_EMAIL=s.email;
      showLoading("Carregando obras...");
      await loadD();
      render();
    }catch(e){localStorage.removeItem("eng8_s");render();}
  } else {
    render();
  }
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
})();

</script>
